name: Rust

on:
  push:
    branches: [ "master" ]
  pull_request:
  

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose
    - name: Build Windows release without console
      if: runner.os == 'Windows'
      run: cargo build --release --features=no_console
