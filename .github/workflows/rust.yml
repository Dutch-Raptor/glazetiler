name: Rust

on:
    push:
        branches: ["master"]
    pull_request:

env:
    CARGO_TERM_COLOR: always

jobs:
    build:
        strategy:
            fail-fast: false
            matrix:
                os: [windows-latest, macos-latest]

        runs-on: ${{ matrix.os }}

        steps:
            - uses: actions/checkout@v4
            - name: Check formatting
              run: cargo fmt --check
            - name: Run Clippy
              run: cargo clippy --all-targets -- -D warnings
            - name: Build
              run: cargo build --verbose
            - name: Run tests
              run: cargo test --all-targets --verbose
